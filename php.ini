[PHP]
; -----------------------------------------------------------------------------
; Configuración de Producción - GeliaNV
; -----------------------------------------------------------------------------

; Límites de Memoria y Tiempo (Optimizado para xlswriter)
memory_limit = 512M
max_execution_time = 300
upload_max_filesize = 100M
post_max_size = 100M

; Zona Horaria
date.timezone = America/Mexico_City

; Seguridad
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Optimización de Rendimiento (OPcache)
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1

; Extensiones
; Nota: xlswriter se carga via conf.d en el Dockerfile, no es necesario aquí.