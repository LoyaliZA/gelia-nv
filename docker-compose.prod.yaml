services:
  # Servicio principal: PHP-FPM para peticiones web
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gelianv-prod:latest
    container_name: gelianv_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    networks:
      - gelianv_net
      

  # Servidor Web: Nginx para tráfico HTTP
  web:
    image: nginx:alpine
    container_name: gelianv_web
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gelianv_net

  db:
    image: mysql:8.0
    container_name: gelianv_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gelianv_net

  # WebSockets: Laravel Reverb
  reverb:
    image: gelianv-prod:latest
    container_name: gelianv_reverb
    restart: unless-stopped
    # Sobrescribimos el comando para iniciar Reverb
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    env_file: .env
    depends_on:
      - app
      - redis
    networks:
      - gelianv_net

  # Procesamiento de Colas: Queue Worker
  queue:
    image: gelianv-prod:latest
    container_name: gelianv_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    env_file: .env
    depends_on:
      - app
      - redis
    networks:
      - gelianv_net

  # Programador de Tareas: Cron / Scheduler
  scheduler:
    image: gelianv-prod:latest
    container_name: gelianv_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: .env
    depends_on:
      - app
    networks:
      - gelianv_net

  # Persistencia de datos para colas y Reverb
  redis:
    image: redis:alpine
    container_name: gelianv_redis
    restart: unless-stopped
    networks:
      - gelianv_net

  # Conector de Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gelianv_tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - gelianv_net

networks:
  gelianv_net:
    driver: bridge

volumes:
  storage_data: