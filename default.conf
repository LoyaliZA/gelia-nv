# Cloudflare Tunnel (cloudflared) llega por la red Docker.
# Restaura $remote_addr desde CF-Connecting-IP para que PHP/Laravel
# registren la IP del equipo del usuario y no la del contenedor.
# (set_real_ip_from / real_ip_header se repiten por server: conf.d no tiene http{})

# ==========================================================
# Formulario público (DNS exclusivo): form.neobash.site
# Solo /direcciones-envio* + assets Vite/favicon
# ==========================================================
server {
    listen 80;
    listen [::]:80;
    server_name form.neobash.site;

    client_max_body_size 20M;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header CF-Connecting-IP;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ^~ /build/ {
        access_log off;
        expires 7d;
        try_files $uri =404;
    }

    location = /favicon.svg { access_log off; log_not_found off; try_files $uri =404; }
    location = /favicon.ico { access_log off; log_not_found off; try_files $uri =404; }
    location = /favicon-192.png { access_log off; log_not_found off; try_files $uri =404; }

    location ^~ /direcciones-envio {
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # IP real del visitante (Cloudflare); evita spoof vía XFF del cliente
        fastcgi_param HTTP_X_FORWARDED_FOR $http_cf_connecting_ip;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_cf_connecting_ip;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param HTTP_PROXY "";
    }

    location / {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ==========================================================
# Panel GELIA (host interno): gelianv.neobash.site
# ==========================================================
server {
    listen 80;
    listen [::]:80;
    server_name gelianv.neobash.site;

    client_max_body_size 100M;

    root /var/www/html/public;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header CF-Connecting-IP;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    index index.php;
    charset utf-8;

    # WebSockets (Laravel Reverb)
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /apps/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # IP real del visitante (Cloudflare); evita spoof vía XFF del cliente
        fastcgi_param HTTP_X_FORWARDED_FOR $http_cf_connecting_ip;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_cf_connecting_ip;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ==========================================================
# Hosts desconocidos: no servir la app
# ==========================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 404;
}
